  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: scenarii alternative'
  body: Un trader matur are scenariu principal și scenariu alternativ. Asta reduce atașamentul și te ajută să vezi piața, nu doar direcția dorită.
  practical: Pentru același instrument, scrie un scenariu bullish și unul bearish cu invalidări clare.
  question: Care scenariu are condiții mai clare în acest moment?
