  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: setup checklist'
  body: 'Un checklist bun nu trebuie să aibă 30 de puncte. Pentru SMC, patru întrebări pot fi suficiente: unde e lichiditatea, care e biasul, ce confirmă, unde e invalidarea.'
  practical: Construiește un checklist cu maximum șase criterii și folosește-l pe 10 grafice istorice.
  question: Ce criteriu este absolut obligatoriu pentru tine?
