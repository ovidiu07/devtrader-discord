  difficulty: beginner
  title: '📘 Conceptul zilei: ego-ul traderului'
  body: Ego-ul apare când vrei să ai dreptate mai mult decât vrei să gestionezi riscul. Piața pedepsește rigiditatea, nu lipsa de inteligență.
