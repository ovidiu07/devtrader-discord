  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: relative strength'
  body: Forța relativă arată care activ conduce mișcarea. Dacă NQ recuperează mai rapid decât ES sau DAX rămâne slab față de Europa, contextul oferă indicii despre sentiment.
  practical: Compară două instrumente similare în aceeași sesiune și notează care respectă mai bine structura bullish/bearish.
  question: Ce activ conduce sentimentul astăzi?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_055
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: entry după confirmare'
  body: Intrarea după confirmare sacrifică uneori preț perfect, dar reduce anticiparea. Pentru începători, claritatea este mai valoroasă decât prinderea exactă a wick-ului.
  practical: Alege un setup și compară intrarea anticipată cu intrarea după displacement și retragere.
  question: Ce ai câștiga dacă ai accepta să intri mai târziu, dar mai clar?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
