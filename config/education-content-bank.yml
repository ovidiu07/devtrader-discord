- key: bazele_059
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: calitatea setup-ului'
  body: Calitatea setup-ului crește când ai locație bună, timp potrivit, confirmare clară și risc logic. Scade când intrarea este în mijlocul range-ului sau după mișcare extinsă.
  practical: Notează fiecare idee de la 1 la 5 pentru locație, confirmare, risc și target.
  question: Care scor minim ar trebui să aibă o idee ca să merite atenție?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_060
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: simplificarea graficului'
  body: Prea multe zone pe grafic reduc claritatea. Un trader bun știe să elimine nivelurile secundare și să păstreze doar zonele care schimbă decizia.
  practical: 'Șterge toate marcajele și redesenează doar trei zone: lichiditate, zonă de interes, invalidare.'
  question: Ce zonă ai păstrat pentru că este reală, nu pentru că îți place?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: risc_001
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: risc fix per idee'
  body: Riscul fix îți permite să compari calitatea deciziilor fără să fie distorsionate de mărimea poziției. Pentru începători, 0.25%-1% per idee este mai ușor de controlat decât ajustarea impulsivă după emoție.
  practical: Calculează 0.25%, 0.5% și 1% pentru un cont ipotetic și scrie ce variantă ți-ar permite să rămâi calm după trei pierderi.
  question: Ce procent îți permite să gândești clar după o pierdere?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_002
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: position sizing corect'
  body: 'Mărimea poziției se calculează din riscul acceptat și distanța până la invalidare. Formula simplă este: sumă riscată împărțită la distanța până la stop, ajustată la valoarea punctului/pip-ului.'
  practical: Ia un exemplu cu stop de 20 puncte și unul cu stop de 50 puncte, păstrând aceeași sumă riscată.
  question: Cum se schimbă poziția când invalidarea este mai departe?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_003
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: stop logic vs stop confortabil'
  body: Un stop logic stă dincolo de punctul unde ideea nu mai are sens. Un stop confortabil stă unde pierderea pare mică, dar poate fi lovit de zgomot normal.
  practical: Marchează invalidarea tehnică înainte să calculezi dacă pierderea îți convine.
  question: Stop-ul tău protejează setup-ul sau doar emoția?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_004
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: max daily loss'
  body: Limita zilnică de pierdere este o frână de comportament, nu doar o regulă matematică. Când este atinsă, scopul devine protejarea minții și oprirea deteriorării deciziilor.
  practical: Definește o limită zilnică în R, de exemplu -2R sau -3R, și scrie acțiunea obligatorie după atingere.
  question: Ce te-ar face să respecți oprirea chiar dacă vezi un setup aparent bun?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_005
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: max weekly loss'
  body: Limita săptămânală te protejează de spirală după mai multe zile slabe. O săptămână dificilă nu trebuie transformată într-o problemă de cont prin mărirea riscului.
  practical: Simulează o săptămână cu trei zile negative și stabilește când reduci riscul sau treci pe observație.
  question: Care este punctul în care ar trebui să oprești execuțiile pentru restul săptămânii?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_006
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: R-multiple'
  body: R-multiple separă performanța de bani și îți arată calitatea procesului. Dacă riști 1R, rezultatele pot fi comparate indiferent de instrument sau mărimea contului.
  practical: 'Transformă ultimele 10 exemple din jurnal în R: -1R, +0.5R, +2R etc.'
  question: Îți este mai clar progresul când îl măsori în R?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_007
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: expectancy'
  body: 'Expectancy arată media așteptată pe trade: rata de câștig, mărimea câștigului și mărimea pierderii lucrează împreună. O strategie cu win rate mai mic poate fi profitabilă dacă R-ul mediu este bun.'
  practical: 'Construiește două scenarii: 40% win rate cu +2R mediu și 60% win rate cu +0.8R mediu.'
  question: Ce combinație între win rate și R:R se potrivește stilului tău?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_008
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: risk-reward realist'
  body: Un R:R mare pe hârtie nu valorează mult dacă targetul nu este într-o zonă logică. Ținta trebuie să corespundă structurii și lichidității, nu dorinței de a avea 1:5.
  practical: Pentru o idee, marchează targetul tehnic înainte să calculezi R:R.
  question: Targetul tău este logic sau doar arată bine în jurnal?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_009
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: drawdown matematic'
  body: Drawdown-ul devine greu de recuperat pe măsură ce crește. O pierdere de 10% cere aproximativ 11.1% recuperare, iar una de 50% cere 100%, deci protecția capitalului este prioritară.
  practical: Compară recuperarea necesară după -5%, -10%, -20% și -50%.
  question: Ce drawdown maxim ai accepta fără să îți schimbi comportamentul?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_010
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: serii de pierderi'
  body: Seriile negative sunt normale chiar și într-un proces bun. Riscul trebuie setat astfel încât 5-10 pierderi consecutive să fie suportabile financiar și psihologic.
  practical: Simulează 7 pierderi consecutive la 0.5%, 1% și 2%.
  question: La ce nivel de risc o serie negativă devine periculoasă pentru disciplina ta?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_011
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: reducerea riscului după abatere'
  body: Dacă ai încălcat planul, problema nu este doar rezultatul, ci pierderea controlului. Reducerea riscului sau trecerea pe demo pentru câteva sesiuni poate reface disciplina.
  practical: 'Scrie o regulă: după o abatere majoră, următoarele X sesiuni au risc redus sau zero execuții.'
  question: Ce abatere ar trebui să activeze automat această regulă?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_012
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: nu adăuga la pierdere'
  body: Adăugarea la o poziție pierzătoare fără un plan prestabilit poate transforma o pierdere controlată într-una disproporționată. Averaging down este periculos când vine din speranță.
  practical: Simulează cum se dublează expunerea dacă adaugi aceeași mărime după -0.5R.
  question: Adaugi pentru că planul prevede sau pentru că nu accepți invalidarea?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_013
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: scaling in planificat'
  body: Scaling in poate avea sens doar dacă este planificat, riscul total rămâne limitat și structura confirmă continuarea. Nu trebuie folosit ca metodă de reparare a unei intrări slabe.
  practical: Definește dinainte două puncte de adăugare și riscul total maxim cumulat.
  question: Cum te asiguri că adăugarea nu depășește riscul inițial acceptat?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_014
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: parțiale'
  body: Închiderea parțială poate reduce presiunea, dar poate și tăia prea devreme edge-ul dacă este făcută din frică. Regula trebuie testată, nu aleasă emoțional în timpul trade-ului.
  practical: Compară pe 20 exemple rezultatul cu full TP versus parțial la 1R și rest la target.
  question: Parțialele îți îmbunătățesc statistica sau doar confortul?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_015
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: break-even'
  body: Mutarea la break-even prea devreme poate transforma setup-uri bune în rezultate neutre. BE trebuie legat de structură sau de atingerea unei zone intermediare, nu de frică.
  practical: Pe 10 exemple, notează dacă BE-ul ar fi protejat capitalul sau ar fi scos trade-ul înainte de target.
  question: Când are sens tehnic să muți stop-ul la BE?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_016
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: trailing stop'
  body: Trailing stop-ul urmărește protejarea profitului pe măsură ce piața livrează. Dacă este prea agresiv, poate opri prematur un trend normal; dacă este prea larg, poate lăsa prea mult profit înapoi.
  practical: Testează trailing după swing-uri LTF versus trailing la fiecare FVG respectat.
  question: Ce structură folosești pentru trailing, nu doar ce sumă vrei să protejezi?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_017
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: risk înainte de știri'
  body: Știrile mari pot mări spread-ul, slippage-ul și viteza mișcării. Pentru începători, reducerea riscului sau observația în jurul CPI, NFP și FOMC este o decizie matură.
  practical: Marchează în calendar știrile cu impact ridicat și definește o fereastră de no-trade înainte/după ele.
  question: Ce eveniment macro te afectează cel mai mult ca disciplină?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_018
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: costuri de tranzacționare'
  body: Spread-ul, comisionul și slippage-ul pot transforma un setup aparent bun într-unul slab, mai ales pe scalping. R:R-ul real trebuie calculat după costuri.
  practical: Calculează R-ul efectiv dacă spread-ul consumă 10-20% din stop.
  question: Instrumentul tău are costuri potrivite pentru timeframe-ul folosit?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_019
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: slippage'
  body: Slippage-ul apare când execuția se face la alt preț decât cel așteptat. Este mai probabil în știri, deschideri de sesiune, instrumente volatile sau lichiditate subțire.
  practical: Notează în jurnal diferența dintre prețul dorit și prețul executat pentru 20 de exemple.
  question: Când ai observat cel mai mare slippage?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_020
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: spread variabil'
  body: Spread-ul variabil poate crește exact când piața devine atractivă vizual. Dacă stop-ul este foarte strâns, spread-ul poate afecta disproporționat riscul.
  practical: Verifică spread-ul în perioade calme, la deschidere și înainte de știri.
  question: Cât din stop este consumat de spread în medie?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_021
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: volatilitate și stop'
  body: Când volatilitatea crește, stop-ul tehnic este adesea mai larg. Pentru același risc total, poziția trebuie redusă, nu păstrată la fel.
  practical: Compară dimensiunea lumânărilor într-o zi calmă și una volatilă și ajustează poziția ipotetică.
  question: Reduci mărimea când stop-ul logic devine mai mare?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_022
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: ATR ca filtru'
  body: ATR nu oferă direcție, dar poate arăta dacă piața este mai volatilă decât de obicei. Este util pentru a evita stop-uri prea strânse în zile agresive.
  practical: Compară ATR-ul actual cu media ultimelor zile și observă dacă setup-urile au nevoie de spațiu mai mare.
  question: Volatilitatea curentă susține stilul tău sau îl face prea riscant?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_023
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: risc pe sesiune'
  body: Unele sesiuni sunt mai volatile și mai rapide decât altele. Poți seta risc diferit pentru London, NY AM sau perioadele de mijloc ale zilei, dar regula trebuie scrisă înainte.
  practical: Analizează istoricul tău pe sesiuni și vezi unde apar cele mai multe abateri.
  question: În ce sesiune meriți risc normal și în ce sesiune ar trebui să reduci?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_024
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: max trades per day'
  body: Limita de trade-uri previne overtradingul mascat în analiză. Dacă ai voie maximum 2-3 idei, devii mai selectiv cu calitatea setup-ului.
  practical: Setează o limită zilnică și obligă-te să argumentezi fiecare idee înainte de execuție.
  question: Câte trade-uri pe zi îți mențin claritatea?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_025
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: cooldown după trade'
  body: După o execuție, emoția poate distorsiona următoarea decizie. Un cooldown de 10-20 minute reduce impulsul de a reacționa imediat.
  practical: 'Scrie o regulă: după fiecare rezultat, nu analizezi alt setup până nu completezi jurnalul scurt.'
  question: Ce simți imediat după un câștig sau o pierdere?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_026
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: risc după câștig mare'
  body: Un câștig mare poate crea impresia că ai voie să forțezi. De multe ori, riscul crește după profit, nu după pierdere, pentru că apare încrederea excesivă.
  practical: 'Definește regula: după +X R într-o zi, opresc sau reduc riscul.'
  question: Ai tendința să protejezi profitul sau să îl folosești ca permisiune pentru risc?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_027
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: risc după pierdere mare'
  body: După o pierdere mare, obiectivul nu este recuperarea imediată, ci revenirea la control. Următorul trade făcut din presiune are risc psihologic mai mare decât pare matematic.
  practical: Scrie ce faci în primele 30 de minute după o pierdere care te afectează.
  question: Ce acțiune te readuce la proces după o pierdere mare?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_028
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: capital de învățare'
  body: Capitalul de la început trebuie văzut ca resursă de educație, nu ca motor de venit. Dacă îl expui agresiv, pierzi timpul necesar pentru a acumula date despre proces.
  practical: Definește câte luni vrei să supraviețuiască contul chiar și cu rezultate mixte.
  question: Riscarea actuală îți oferă timp să înveți?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_029
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: demo vs live'
  body: Demo este util pentru proces și execuție tehnică, dar live adaugă emoție reală. Trecerea la live trebuie făcută cu risc mic, nu cu așteptări de profit imediat.
  practical: 'Stabilește criterii pentru trecerea de la demo la live: număr de sesiuni, respectarea regulilor, jurnal complet.'
  question: Ce trebuie să demonstrezi înainte să crești expunerea?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_030
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: risc pe instrument'
  body: DAX, NQ, aurul sau acțiunile volatile nu au același comportament. Riscul trebuie adaptat la viteza, spread-ul și volatilitatea fiecărui instrument.
  practical: Compară mișcarea medie și costurile pentru două instrumente pe care le urmărești.
  question: Tratezi toate instrumentele la fel sau le adaptezi?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_031
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: corelare între poziții'
  body: Două poziții corelate pot însemna un singur pariu mărit. Long NQ și long DAX în același context risk-on pot dubla expunerea la sentimentul pieței.
  practical: 'Notează dacă două trade-uri depind de același factor: dolar, randamente, sentiment, știri.'
  question: Ai diversificare reală sau aceeași idee în mai multe forme?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_032
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: exposure total'
  body: Expunerea totală contează mai mult decât riscul individual când ai mai multe poziții deschise. Trei trade-uri de 1R pot crea o zi de -3R dacă sunt corelate.
  practical: Calculează riscul cumulat înainte să deschizi a doua sau a treia poziție.
  question: Care este riscul maxim total acceptat simultan?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_033
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: regula de no-trade'
  body: 'Regulile de no-trade sunt la fel de importante ca regulile de entry. Exemple: după limită zilnică, în știri majore, oboseală ridicată, lipsă de setup clar.'
  practical: Scrie cinci condiții în care nu ai voie să execuți, indiferent cât de atractiv pare graficul.
  question: Ce condiție de no-trade ai încălcat cel mai des?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_034
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: checklist de risc'
  body: 'Un checklist de risc trebuie completat înainte de intrare: risc în R, invalidare, target logic, știri, costuri, starea mentală. Dacă lipsește ceva, execuția se amână.'
  practical: Creează o fișă de 6 întrebări pe care o completezi înainte de orice trade.
  question: Ce întrebare din checklist te-ar salva cel mai des?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_035
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: jurnal de risc planificat vs real'
  body: Diferența dintre riscul planificat și cel real arată disciplina de execuție. Dacă riscul real este frecvent mai mare, problema este comportamentul, nu strategia.
  practical: 'Adaugă în jurnal coloanele: risc planificat, risc executat, motiv diferență.'
  question: Cât de des execuți exact riscul planificat?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_036
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: risc și calitatea setup-ului'
  body: Risc mai mare pe setup-uri 'mai bune' poate părea logic, dar pentru începători duce ușor la subiectivitate. Mai întâi ai nevoie de date solide, nu de încredere selectivă.
  practical: Păstrează risc fix pe 50 de exemple și evaluează calitatea separat.
  question: Ai suficiente date ca să justifici risc variabil?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_037
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: tiered risk'
  body: 'Tiered risk înseamnă să ai niveluri: risc mic pentru studiu, normal pentru setup A+, zero pentru piață neclară. Funcționează doar dacă definești clar ce este A+.'
  practical: Definește criteriile pentru risc 0, risc redus și risc normal.
  question: Ce criterii trebuie bifate ca să meriți risc normal?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_038
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: risc și lichiditate de piață'
  body: Lichiditatea slabă poate crește mișcările haotice și execuțiile slabe. În ore moarte sau instrumente subțiri, aceeași strategie poate performa diferit.
  practical: Compară execuțiile din ore active cu cele din ore lente.
  question: Când simți că piața nu are suficientă lichiditate pentru stilul tău?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_039
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: gap risk'
  body: Gap risk apare când prețul sare peste niveluri, mai ales peste noapte sau după știri. Stop-ul nu garantează întotdeauna execuție exactă la prețul dorit.
  practical: Pentru instrumentul urmărit, verifică dacă apar gap-uri frecvente între sesiuni.
  question: Ții poziții în perioade unde gap-ul poate depăși riscul planificat?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_040
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: overnight risk'
  body: Pozițiile ținute peste noapte sunt expuse la știri, gap-uri și lichiditate diferită. Intraday tradingul reduce acest risc, dar cere disciplină la închidere.
  practical: 'Scrie o regulă clară: când ai voie și când nu ai voie să ții peste noapte.'
  question: Ținerea peste noapte face parte din strategie sau din speranță?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_041
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: weekend risk'
  body: Weekendul poate aduce evenimente geopolitice sau știri care redeschid piața cu gap. Pentru traderii intraday, evitarea expunerii peste weekend este deseori mai curată.
  practical: Notează ce instrumente pot fi afectate de știri în weekend.
  question: Ai o regulă de închidere înainte de weekend?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_042
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: risc pe știri geopolitice'
  body: Știrile geopolitice pot fi greu de modelat pentru că evoluează neprogramat. Riscul trebuie redus când titlurile schimbă rapid sentimentul și lichiditatea.
  practical: Alege un eveniment geopolitic și observă dacă piața a avut mișcări curate sau spike-uri contradictorii.
  question: Când știrea este prea incertă pentru execuție?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_043
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: risc în fază de range'
  body: Range-ul produce multe semnale false și stop-uri prinse la extreme. Riscul poate fi redus sau setup-urile filtrate doar la extreme, nu în mijloc.
  practical: Marchează mijlocul range-ului și interzice intrările acolo în exercițiul tău.
  question: Cum recunoști că piața nu oferă edge suficient?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_044
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: risc în trend puternic'
  body: În trend puternic, riscul vine din intrări prea târzii și stop-uri plasate în zone evidente. Nu orice retragere mică justifică intrare dacă prețul este aproape de lichiditate externă.
  practical: Analizează dacă intrarea este înainte sau după extensia principală.
  question: Ești poziționat la valoare sau alergi după mișcare?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_045
  category: managementul_riscului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: risc de bias direcțional'
  body: Când ești prea convins de direcție, ignori invalidarea și informațiile contrare. Riscul crește deoarece începi să interpretezi piața selectiv.
  practical: Pentru fiecare analiză, scrie ce ar demonstra că greșești.
  question: Ce informație opusă ai ignorat recent?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_046
  category: managementul_riscului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: risc de sistem netestat'
  body: O regulă intuitivă poate părea bună pe câteva exemple, dar fără testare nu știi distribuția rezultatelor. Risc real se pune doar pe procese măsurate.
  practical: Testează o regulă pe minimum 30 exemple istorice înainte să o tratezi ca edge.
  question: Ce regulă folosești fără suficiente date?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_047
  category: managementul_riscului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: backtesting și risc'
  body: Backtestingul nu este doar despre win rate; trebuie să arate drawdown, serii negative, R mediu și condiții de piață unde setup-ul slăbește.
  practical: 'Pentru un setup, notează pe 50 exemple: rezultat R, sesiune, context, greșeli.'
  question: Ce statistică te-ar face să reduci riscul?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_048
  category: managementul_riscului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: forward testing'
  body: Forward testingul verifică dacă poți respecta regulile în timp real. Multe setup-uri arată clar după fapt, dar sunt mai greu de executat live.
  practical: Rulează 20 de sesiuni demo cu reguli stricte și fără modificări în timpul testului.
  question: Poți respecta sistemul când nu știi încă rezultatul?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_049
  category: managementul_riscului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: risc și obiective lunare'
  body: Obiectivele financiare agresive pot împinge riscul peste nivelul sănătos. Procesul trebuie construit pe decizii repetabile, nu pe presiunea unei sume lunare.
  practical: 'Înlocuiește targetul de bani cu targeturi de proces: respectare risc, jurnal complet, zero revenge.'
  question: Ce obiectiv de proces ar reduce presiunea?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_050
  category: managementul_riscului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: risc și prop firm'
  body: 'Conturile de tip funding au reguli specifice: daily loss, max loss, trailing drawdown, restricții de știri. Strategia trebuie adaptată acestor limite, nu invers.'
  practical: Scrie limitele contului și transformă-le în reguli zilnice concrete.
  question: Care regulă de funding îți poate invalida stilul actual?
  disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
- key: risc_051
  category: managementul_riscului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: risc în acțiuni volatile'
  body: Acțiunile cu preț mic și catalizatori mari pot avea mișcări rapide, halt-uri și spread-uri extinse. Position sizing-ul trebuie să includă riscul de execuție imperfectă.
  practical: Pentru o acțiune volatilă, verifică volumul, spread-ul, float-ul și istoricul de halt-uri.
