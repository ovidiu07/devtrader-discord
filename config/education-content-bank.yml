  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: imbalances consecutive'
  body: Mai multe imbalances consecutive arată livrare agresivă, dar pot crea și risc de retragere profundă ulterior. Nu urmări prețul târziu doar pentru că impulsul arată puternic.
  practical: Găsește un impuls cu cel puțin două FVG-uri și observă care a fost respectat la retragere.
  question: Ești la începutul impulsului sau alergi după el?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_047
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: failed auction'
  body: Un failed auction apare când prețul atacă o zonă evidentă, dar nu reușește să accepte dincolo de ea. În SMC, poate semnala că lichiditatea a fost luată și piața se pregătește să livreze invers.
  practical: Caută un wick peste maxim urmat de închidere sub nivel și displacement opus.
  question: Eșecul de acceptare este suficient de clar sau nivelul încă este presat?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
