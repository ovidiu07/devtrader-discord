  difficulty: beginner
  title: '⚠️ Greșeala zilei: checklist mental'
  body: Checklistul mental este bariera dintre idee și execuție. Dacă nu poți răspunde clar la context, confirmare, invalidare și risc, nu ai setup, ai impuls.
