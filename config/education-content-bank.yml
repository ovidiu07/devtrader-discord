    title: "📘 Conceptul zilei: recap de jurnal"
    body: "La final de săptămână, jurnalul trebuie citit, nu doar completat. Caută tipare: grabă, claritate, confuzie, respectarea regulilor."
    practical: Marchează cu o culoare greșelile repetate și cu alta deciziile bune.
    question: Ce tipar apare cel mai des?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
