  difficulty: beginner
  title: '🧩 Exercițiul zilei: oboseala'
  body: Oboseala scade calitatea percepției și mărește impulsivitatea. Uneori piața nu este problema; starea ta este incompatibilă cu decizii rapide.
  practical: Evaluează energia de la 1 la 5 înainte de sesiune și interzice execuția sub un prag ales.
