posts:
- key: bazele_001
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: structura HH-HL/LH-LL'
  body: Structura nu înseamnă să numeri mecanic maxime și minime, ci să vezi unde piața apără agresiv prețul și unde cedează. Într-un trend sănătos, corecțiile nu ar trebui să invalideze ultimul punct logic de apărare.
  practical: Marchează pe 1H ultimele trei swing-uri relevante și scrie unde trendul ar fi invalidat, nu doar unde pare că se întoarce.
  question: Care este swing-ul care, dacă este spart, schimbă cu adevărat povestea pieței?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_002
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: BOS vs CHOCH'
  body: 'Un BOS confirmă continuarea structurii dominante, în timp ce un CHOCH sugerează că presiunea poate începe să se schimbe. Diferența contează: un CHOCH izolat într-o zonă fără lichiditate luată poate fi doar zgomot.'
  practical: 'Găsește două exemple: unul unde BOS continuă trendul și unul unde CHOCH apare după un sweep de lichiditate.'
  question: În analiza ta, CHOCH-ul apare după un eveniment logic sau doar după o lumânare mare?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_003
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: lichiditate buy-side și sell-side'
  body: Buy-side liquidity stă de obicei peste maxime evidente, iar sell-side liquidity sub minime evidente. Prețul caută adesea aceste zone nu pentru că sunt magice, ci pentru că acolo se concentrează ordine, stop-uri și breakout traders.
  practical: Marchează cel mai evident maxim și minim al sesiunii și observă dacă prețul le atacă înainte de mișcarea reală.
  question: 'Unde este lichiditatea mai evidentă acum: deasupra maximelor sau sub minime?'
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_004
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: equal highs și equal lows'
  body: Equal highs și equal lows sunt zone unde mulți traderi văd același nivel. În SMC, ele pot funcționa ca magnet de lichiditate, dar nu devin automat semnal de intrare.
  practical: Caută un EQL/EQH și verifică dacă după sweep apare displacement sau prețul continuă fără reacție.
  question: Ce diferență vezi între o colectare de lichiditate și un breakout real?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_005
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: sweep-ul de lichiditate'
  body: Un sweep este o depășire a unui nivel evident urmată de respingere sau schimbare de comportament. Sweep-ul valoros apare de preferat într-o zonă HTF relevantă, nu în mijlocul unui grafic haotic.
  practical: Notează un exemplu în care prețul trece peste un maxim, revine sub el și apoi rupe structura pe LTF.
  question: Ce confirmare ai cere după un sweep înainte să iei scenariul în serios?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_006
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: displacement-ul'
  body: 'Displacement-ul este mișcarea impulsivă care arată dezechilibru real între cumpărători și vânzători. O lumânare mare nu este suficientă: contează dacă rupe structură, lasă FVG și apare după lichiditate luată.'
  practical: 'Identifică o mișcare impulsivă și verifică dacă are trei elemente: sweep, rupere de structură, imbalance.'
  question: Displacement-ul pe care îl vezi schimbă contextul sau doar impresionează vizual?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_007
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: Fair Value Gap'
  body: Un FVG reprezintă o zonă de inefficiency unde prețul s-a mișcat prea rapid și nu a tranzacționat echilibrat. Calitatea lui crește dacă apare după lichiditate luată și după o schimbare clară de structură.
  practical: Marchează FVG-ul dintr-un impuls și observă dacă retragerea respectă 50% din gap sau îl umple complet.
  question: FVG-ul urmărit apare în direcția contextului sau împotriva lui?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_008
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: Order Block valid'
  body: Un order block util nu este orice lumânare opusă impulsului. Contează să fie legat de mișcarea care a luat lichiditate, a creat displacement și a rupt structură.
  practical: Alege trei order block-uri și păstrează doar pe cele care au generat o rupere clară de structură.
  question: Ce criteriu te oprește să marchezi prea multe order block-uri?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_009
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: mitigation'
  body: Mitigation înseamnă revenirea prețului într-o zonă unde ordinele instituționale ar putea fi reechilibrate. Nu orice revenire este oportunitate; dacă reacția lipsește, zona poate fi doar tranzitată.
  practical: Urmărește o zonă de OB/FVG și notează dacă reacția apare rapid sau prețul se comprimă fără intenție.
  question: Ce semn îți arată că zona este respectată, nu doar atinsă?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_010
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: premium și discount'
  body: Într-un range relevant, zona de discount este sub 50%, iar premium este peste 50%. Pentru long-uri, discountul oferă de obicei locație mai bună; pentru short-uri, premiumul oferă o zonă mai logică.
  practical: Trasează un dealing range între swing high și swing low și marchează 50%, premium și discount.
  question: Ideea ta este poziționată în zona potrivită pentru direcția dorită?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_011
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: dealing range'
  body: Dealing range-ul definește contextul în care interpretezi premium, discount, lichiditate și PD arrays. Greșeala comună este să alegi un range prea mic doar ca să justifici un setup.
  practical: Alege range-ul generat de ultima mișcare care a rupt structură, apoi verifică unde se află prețul acum.
  question: Range-ul tău este ales obiectiv sau l-ai ajustat ca să susțină ideea?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_012
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: inducement'
  body: Inducement-ul este o zonă care atrage intrări premature înainte ca prețul să ajungă în zona mai bună. El apare deseori ca un mini suport/rezistență sau un FVG prea evident înainte de OB-ul principal.
  practical: Caută un setup unde primul nivel tentant a fost spart înainte ca prețul să reacționeze din zona reală.
  question: Ce nivel ar putea atrage traderii prea devreme în analiza actuală?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_013
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: breaker block'
  body: Un breaker apare când o zonă care trebuia să susțină direcția eșuează și devine ulterior zonă de reacție inversă. Este util mai ales după sweep și schimbare de structură.
  practical: Găsește o zonă de suport care a cedat, apoi observă dacă retestul ei a devenit rezistență.
  question: Piața a invalidat cu adevărat zona veche sau doar a făcut un wick?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_014
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: liquidity void'
  body: Liquidity void-ul este o mișcare rapidă cu tranzacționare subțire, lăsând zone pe care prețul le poate reechilibra ulterior. Nu fiecare void trebuie umplut imediat.
  practical: Marchează o mișcare foarte rapidă și observă unde revine prețul înainte să continue sau să inverseze.
  question: Void-ul este în direcția impulsului principal sau este parte dintr-o mișcare de știri?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_015
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: market maker model'
  body: 'Modelul de acumulare, manipulare și distribuție ajută la citirea zilei: prețul poate construi lichiditate, o poate lua, apoi poate livra direcția reală. Este mai util ca hartă de comportament decât ca șablon rigid.'
  practical: 'Împarte o zi în trei faze: consolidare, sweep, impuls. Vezi dacă ordinea are sens.'
  question: 'În ce fază pare piața acum: acumulare, manipulare sau distribuție?'
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_016
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: killzone și sesiuni'
  body: Sesiunile contează deoarece lichiditatea și volatilitatea nu sunt egale toată ziua. London și New York pot schimba ritmul, mai ales pe indici, forex și aur.
  practical: Notează maximul/minimul Asiei, apoi observă cum reacționează Londra și New York față de acele niveluri.
  question: În ce sesiune vezi cele mai curate mișcări pentru instrumentul tău?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_017
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: Asia range'
  body: Asia range-ul poate construi lichiditatea pe care London sau New York o atacă. Un sweep al maximului/minimului Asiei nu este suficient; contează reacția după sweep.
  practical: Marchează range-ul Asiei și urmărește prima depășire serioasă în sesiunea următoare.
  question: După sweep, piața a livrat invers sau a continuat direcția breakout-ului?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_018
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: New York AM'
  body: NY AM poate aduce direcția dominantă a zilei, mai ales când se aliniază cu știri sau deschiderea pieței americane. Pentru indici, reacția la 16:30 ora României poate schimba complet contextul.
  practical: Observă primele 30-60 minute după deschiderea SUA și notează dacă se ia lichiditate înainte de direcție.
  question: Te grăbești înainte de deschidere sau aștepți să se formeze intenția?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_019
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: open price și daily bias'
  body: Prețul de deschidere al zilei poate ajuta la citirea biasului intraday. Dacă piața respinge sub open și recuperează agresiv, contextul poate deveni diferit față de prima impresie.
  practical: Marchează daily open și observă unde se menține prețul în primele ore active.
  question: Prețul acceptă deasupra sau dedesubtul deschiderii zilei?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_020
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: daily high/low'
  body: Maximul și minimul zilei sunt niveluri cheie pentru lichiditate intraday. Multe zile construiesc un high/low fals înainte de mișcarea principală.
  practical: Pe ultimele cinci zile, identifică dacă high/low-ul zilei s-a format înainte sau după un sweep.
  question: Unde ar putea fi high-ul sau low-ul probabil al zilei dacă scenariul se confirmă?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_021
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: internal vs external liquidity'
  body: Lichiditatea internă se află în interiorul range-ului, iar cea externă la extreme. Prețul poate lua mai întâi lichiditate internă înainte să livreze spre cea externă.
  practical: Marchează lichiditatea din interiorul range-ului și lichiditatea de la extreme.
  question: Ținta ta este lichiditate internă sau externă?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_022
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: PD arrays'
  body: PD arrays sunt zone de interes precum FVG, OB, breaker, liquidity pool sau imbalance. Valoarea lor depinde de context, nu de numărul lor pe grafic.
  practical: Alege un singur PD array relevant și explică de ce este superior altor zone apropiate.
  question: Care este cel mai curat PD array din direcția biasului?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_023
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: confluența reală'
  body: Confluența reală înseamnă aliniere între context HTF, lichiditate, displacement, locație premium/discount și timp. Dacă adaugi multe elemente slabe, nu obții un setup puternic.
  practical: Scrie maximum patru criterii pentru o idee și refuză setup-ul dacă lipsesc două.
  question: Confluența ta adaugă claritate sau doar justifică o dorință?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_024
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: confirmare pe LTF'
  body: Confirmarea pe timeframe mic trebuie să rafineze intrarea, nu să contrazică direcția mare. Un CHOCH pe 1 minut este slab dacă pe 1H ești în mijlocul range-ului.
  practical: Pornește de la 1H/15M, apoi caută confirmare pe 5M/1M doar în zona selectată.
  question: LTF-ul confirmă planul HTF sau te face să inventezi un trade nou?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_025
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: entry model'
  body: 'Un entry model simplu poate fi: sweep, displacement, FVG/OB, retragere, reacție. Dacă lipsesc pașii, intrarea devine anticipare.'
  practical: Testează pe istoric acest model în 20 de exemple și notează câte respectă toți pașii.
  question: Care pas lipsește cel mai des din intrările tale?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_026
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: invalidarea setup-ului'
  body: Invalidarea trebuie să fie tehnică, nu emoțională. Pentru un long, invalidarea poate fi sub swing-ul care a generat displacement-ul, nu sub orice wick apropiat.
  practical: Pentru trei setup-uri, marchează invalidarea logică și compar-o cu stop-ul pe care l-ai fi ales emoțional.
  question: Stop-ul tău protejează ideea sau doar reduce frica de pierdere?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_027
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: targetarea lichidității'
  body: Țintele logice sunt adesea zone de lichiditate, high/low-uri anterioare sau inefficiency-uri neechilibrate. Un target ales doar pentru R:R poate ignora realitatea graficului.
  practical: Pentru un scenariu, marchează prima țintă internă și ținta externă de lichiditate.
  question: Ținta ta este într-o zonă unde piața are motiv să ajungă?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_028
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: continuare vs reversal'
  body: Un reversal bun cere de obicei lichiditate luată, pierderea structurii și acceptare în direcția opusă. Fără aceste elemente, este posibil să fie doar o corecție.
  practical: Compară un reversal real cu o simplă retragere într-un trend.
  question: Ce dovadă ai că piața schimbă direcția, nu doar respiră?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_029
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: range day'
  body: Într-o zi de range, cumpărarea maximelor și vânzarea minimelor devin periculoase. SMC te ajută să vezi când lichiditatea de la extreme este luată fără continuare.
  practical: Identifică o zi în care ambele extreme au fost atacate și prețul a rămas lateral.
  question: Ce regulă te-ar ține departe de mijlocul range-ului?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_030
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: trend day'
  body: Într-o zi de trend, retragerile pot fi superficiale și FVG-urile pot rămâne parțial neatinse. Așteptarea unei corecții perfecte poate însemna să ratezi complet ziua.
  practical: Pe o zi cu trend clar, observă cât de adânci au fost retragerile față de impulsuri.
  question: Cum adaptezi așteptările când piața livrează agresiv într-o direcție?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_031
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: news displacement'
  body: 'Știrile pot crea displacement real, dar și mișcare dezordonată fără structură. Diferența apare după primele minute: piața acceptă noul preț sau inversează complet?'
  practical: Analizează o publicare CPI/NFP și compară prima lumânare cu structura formată după 15-30 minute.
  question: După știre, vezi acceptare sau doar volatilitate fără direcție?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_032
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: liquidity grab înainte de continuare'
  body: Uneori prețul ia lichiditatea împotriva trendului doar pentru a continua direcția principală. Acest comportament poate păcăli traderii care confundă fiecare sweep cu reversal.
  practical: Caută un exemplu unde sell-side liquidity este luată într-un trend bullish, apoi trendul continuă.
  question: Sweep-ul merge împotriva trendului doar pentru combustibil sau schimbă structura?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_033
  category: bazele_tradingului
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: retest vs mitigation'
  body: Retestul clasic verifică o zonă spartă; mitigation-ul revine într-o zonă de ordin/inefficiency. Ambele cer reacție, dar logica din spate este diferită.
  practical: Marchează un retest și o mitigation pe același grafic și scrie diferența.
  question: Zona urmărită este suport/rezistență clasică sau PD array SMC?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_034
  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: wick-uri și corpuri'
  body: Wick-urile arată respingere sau căutare de lichiditate, iar corpurile arată acceptare. Un wick peste un nivel urmat de închidere sub el transmite alt mesaj decât o închidere puternică deasupra.
  practical: Compară trei străpungeri cu wick și trei străpungeri cu închidere clară.
  question: Piața a respins nivelul sau a acceptat prețul dincolo de el?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_035
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: acceptare vs respingere'
  body: Acceptarea apare când prețul rămâne și construiește structură într-o zonă nouă. Respingerea apare când depășirea este rapid anulată.
  practical: După o spargere, așteaptă două-trei lumânări și notează dacă piața construiește sau revine.
  question: Analiza ta se bazează pe acceptare reală sau pe prima reacție?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_036
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: compression înainte de lichiditate'
  body: Compresia spre un nivel indică deseori că prețul se apropie controlat de lichiditate. Spargerea poate fi violentă deoarece stop-urile și breakout-urile se activează împreună.
  practical: Caută un nivel unde lumânările devin tot mai mici înainte de depășire.
  question: Compresia îți arată pregătire pentru continuare sau risc de sweep?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_037
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: timeframe alignment'
  body: Alinierea timeframe-urilor nu înseamnă că toate trebuie să arate identic. Înseamnă ca zona HTF, structura MTF și trigger-ul LTF să spună aceeași poveste.
  practical: Scrie biasul pe 4H, zona pe 1H, confirmarea pe 5M într-o singură propoziție.
  question: Unde apare conflictul între timeframe-uri în analiza ta?
