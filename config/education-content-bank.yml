  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: setup de reversal'
  body: 'Setup-ul de reversal cere mai multă dovadă decât continuarea: lichiditate externă luată, displacement opus, CHOCH/BOS și reacție din PD array. Fără asta, riști să lupți cu trendul.'
  practical: Testează cinci reversal-uri istorice și notează ce semn a confirmat schimbarea.
  question: Ai suficiente dovezi pentru reversal sau doar vrei să prinzi vârful/baza?
