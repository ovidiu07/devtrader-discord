  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: nested structure'
  body: 'Structura este fractală: un pullback pe 1H poate fi trend bearish pe 5M. Problema apare când tratezi structura mică drept direcție mare.'
  practical: Analizează aceeași mișcare pe 1H și 5M și numește ce reprezintă pe fiecare timeframe.
  question: Structura mică este trigger sau îți schimbă nejustificat biasul mare?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_049
  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: liquidity engineering'
  body: Piața poate construi lichiditate prin maxime/minime repetate, trendline-uri evidente sau consolidări. Cu cât nivelul este mai vizibil, cu atât mai mulți participanți îl folosesc pentru decizii.
  practical: Marchează un trendline evident și observă ce se întâmplă când este spart.
  question: Ce nivel pare prea evident pentru a fi ignorat de piață?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_050
  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: trendline liquidity'
  body: Trendline-urile pot crea lichiditate pentru că mulți traderi plasează stop-uri în jurul lor. În SMC, nu linia contează, ci reacția după ce lichiditatea este luată.
  practical: Găsește o linie de trend clară și urmărește dacă spargerea produce continuare sau sweep.
  question: Folosești trendline-ul ca semnal sau ca hartă de lichiditate?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_051
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: liquidity pool după consolidare'
  body: O consolidare strânsă acumulează ordine de ambele părți. Mișcarea inițială după consolidare poate fi direcția reală sau doar colectarea lichidității.
  practical: Marchează high/low-ul unei consolidări și așteaptă reacția după prima spargere.
  question: Prima spargere are acceptare sau revine rapid în range?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_052
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: daily draw on liquidity'
  body: Draw on liquidity este zona spre care piața are probabilitate să livreze, pe baza structurii și lichidității evidente. Nu este predicție fixă, ci orientare pentru scenarii.
  practical: 'Identifică pentru ziua curentă cel mai logic draw: high anterior, low anterior, FVG HTF sau EQH/EQL.'
  question: Care este magnetul principal al prețului în analiza ta?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_053
  category: bazele_tradingului
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: SMT divergence'
  body: SMT apare când două active corelate nu confirmă același high/low. Pe indici, poate sugera slăbiciune sau forță relativă, dar trebuie folosit ca filtru, nu ca semnal unic.
  practical: Compară DAX cu US indices sau NQ cu ES și vezi dacă unul ia high-ul iar celălalt nu.
  question: Divergența arată lipsă de confirmare sau doar diferență normală de volatilitate?
