posts:
  - key: bazele_001
    category: bazele_tradingului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: ce înseamnă un setup"
    body: Un setup este un plan clar, nu doar o idee apărută pe grafic. El include contextul pieței, zona de interes, confirmarea, invalidarea și riscul acceptat.
    practical: Alege un grafic și notează zona, confirmarea și invalidarea înainte să te gândești la execuție.
    question: Cum ai descrie un setup complet în două fraze?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_002
    category: bazele_tradingului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: confirmarea"
    body: Confirmarea apare când piața începe să susțină scenariul urmărit. O zonă interesantă nu este suficientă fără reacție, structură sau alt semn coerent.
    practical: "Compară două grafice: unul cu reacție clară și unul fără reacție. Notează diferența."
    question: Tu ai tendința să aștepți confirmarea sau să anticipezi prea devreme?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_003
    category: bazele_tradingului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: invalidarea"
    body: Invalidarea este condiția care îți spune că ideea analizată nu mai este validă. Ea te ajută să rămâi disciplinat și să nu transformi o analiză într-o speranță.
    practical: Scrie pentru un scenariu simplu ce anume l-ar invalida.
    question: Îți este clară invalidarea înainte de fiecare analiză?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_004
    category: bazele_tradingului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: suport și rezistență"
    body: Suportul și rezistența sunt zone unde prețul a reacționat înainte. Ele nu sunt ziduri fixe, ci zone de interes care trebuie observate în context.
    practical: Marchează trei zone și verifică dacă reacțiile au fost clare sau doar zgomot.
    question: Cum diferențiezi o zonă importantă de una desenată forțat?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_005
    category: bazele_tradingului
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: trendul"
    body: Un trend este o succesiune de maxime și minime care arată direcția dominantă. Începătorii greșesc des când ignoră direcția generală pentru o reacție mică.
    practical: Identifică pe un grafic dacă piața face maxime și minime crescătoare sau descrescătoare.
    question: Ce timeframe folosești ca să înțelegi trendul principal?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_006
    category: bazele_tradingului
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: lumânarea japoneză"
    body: O lumânare arată deschiderea, închiderea, maximul și minimul unei perioade. Forma ei poate sugera presiune, respingere sau indecizie.
    practical: Alege cinci lumânări mari și notează ce informație oferă fiecare.
    question: "Ce observi prima dată la o lumânare: corpul sau umbrele?"
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_007
    category: bazele_tradingului
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: timeframe-ul"
    body: Timeframe-ul schimbă perspectiva. Un grafic de 5 minute poate arăta haotic, în timp ce unul de 4 ore poate arăta o structură clară.
    practical: Uită-te la același activ pe trei timeframe-uri și notează diferențele.
    question: Pe ce timeframe înțelegi cel mai bine structura?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_008
    category: bazele_tradingului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: lichiditatea"
    body: Lichiditatea reprezintă zonele unde există interes și ordine. Prețul se poate mișca rapid către aceste zone, mai ales când mulți participanți urmăresc aceleași niveluri.
    practical: Marchează maxime și minime evidente și observă reacția prețului în jurul lor.
    question: Unde vezi de obicei lichiditate pe un grafic simplu?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_009
    category: bazele_tradingului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: volatilitatea"
    body: Volatilitatea arată cât de mult și cât de repede se mișcă piața. Volatilitatea mare poate crea oportunități de studiu, dar și risc mai mare.
    practical: Compară o zi calmă cu o zi volatilă și notează cum se schimbă lumânările.
    question: Cum îți dai seama că piața este prea agitată pentru nivelul tău?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_010
    category: bazele_tradingului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: volumul"
    body: Volumul arată activitatea din piață. Nu oferă răspunsuri singur, dar poate ajuta la înțelegerea interesului din jurul unor zone.
    practical: Observă ce se întâmplă cu volumul când prețul sparge o zonă importantă.
    question: Folosești volumul ca filtru sau doar observi prețul?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_011
    category: bazele_tradingului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: trading față de investiții"
    body: Tradingul urmărește mișcări pe perioade mai scurte, în timp ce investițiile au de obicei orizont mai lung. Confuzia dintre ele poate duce la decizii dezordonate.
    practical: Scrie diferența dintre o analiză de trade și o decizie de investiție.
    question: Ce abordare ți se potrivește mai bine acum și de ce?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_012
    category: bazele_tradingului
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: contextul pieței"
    body: "Contextul este imaginea de ansamblu: trend, zone, volatilitate și evenimente relevante. Fără context, o intrare poate părea bună doar pentru că este izolată."
    practical: Înainte de orice grafic mic, descrie contextul pe timeframe mai mare.
    question: Ce element de context omiți cel mai des?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_013
    category: bazele_tradingului
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: structura pieței"
    body: Structura pieței arată cum se formează maximele, minimele și reacțiile. Ea te ajută să nu privești fiecare lumânare ca pe un semnal separat.
    practical: Desenează ultimele trei maxime și minime relevante.
    question: Piața analizată acum are structură clară sau este laterală?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_014
    category: bazele_tradingului
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: zona de interes"
    body: O zonă de interes este un loc unde merită să observi reacția pieței. Nu orice zonă devine automat motiv de execuție.
    practical: Alege o singură zonă pe grafic și explică de ce contează.
    question: Ce criteriu folosești ca să alegi o zonă de interes?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_015
    category: bazele_tradingului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: breakout-ul"
    body: Un breakout apare când prețul trece peste o zonă importantă. Pentru studiu, contează dacă mișcarea este susținută sau revine rapid în interval.
    practical: Caută un breakout reușit și unul eșuat pe un grafic istoric.
    question: Ce diferență observi între cele două exemple?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_016
    category: bazele_tradingului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: range-ul"
    body: Un range apare când piața se mișcă între zone relativ clare, fără direcție dominantă. În range, răbdarea și filtrarea sunt foarte importante.
    practical: Marchează limita superioară și inferioară a unui range recent.
    question: Îți este mai ușor să studiezi trendul sau range-ul?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_017
    category: bazele_tradingului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: retestul"
    body: Un retest este revenirea prețului către o zonă depășită. El poate ajuta la observarea reacției, dar nu trebuie tratat automat ca motiv de intrare.
    practical: Găsește trei retesturi și notează care au avut reacție clară.
    question: Ce confirmare ai vrea să vezi la un retest?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_018
    category: bazele_tradingului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: impuls și corecție"
    body: Un impuls este o mișcare puternică, iar corecția este pauza sau retragerea ulterioară. Înțelegerea lor ajută la citirea ritmului pieței.
    practical: Separă pe grafic mișcările impulsive de corecții.
    question: Te atrag mai mult impulsurile sau aștepți corecții?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_019
    category: bazele_tradingului
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: confluența"
    body: "Confluența înseamnă că mai multe elemente susțin aceeași idee: zonă, trend, reacție, volum sau context. Nu înseamnă certitudine."
    practical: Notează două elemente care se aliniază într-o analiză simplă.
    question: Câte criterii ai nevoie ca să consideri o idee suficient de clară?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_020
    category: bazele_tradingului
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: planul înainte de grafic mic"
    body: Un plan bun începe cu imaginea mare. Dacă sari direct pe timeframe mic, poți confunda zgomotul cu o oportunitate reală.
    practical: Începe analiza de azi cu timeframe mare și coboară treptat.
    question: Ce se schimbă când pornești de la imaginea mare?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_021
    category: bazele_tradingului
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: prețul față de indicatori"
    body: Indicatorii pot ajuta, dar prețul rămâne sursa principală de informație. Prea mulți indicatori pot crea confuzie pentru începători.
    practical: Ascunde indicatorii pentru zece minute și descrie doar structura prețului.
    question: Ce indicator folosești și ce problemă concretă rezolvă?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_022
    category: bazele_tradingului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: zona laterală"
    body: O piață laterală poate obosi traderii pentru că oferă multe mișcări false. În astfel de perioade, observația poate fi mai valoroasă decât acțiunea.
    practical: Identifică dacă prețul are direcție sau doar oscilează într-un interval.
    question: Cum te comporți când piața nu are direcție clară?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_023
    category: bazele_tradingului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: nivelul rotund"
    body: Nivelurile rotunde atrag atenția multor participanți. Ele pot deveni zone de reacție, dar trebuie analizate împreună cu structura.
    practical: Urmărește un nivel rotund și notează dacă prețul reacționează în jurul lui.
    question: Ai observat reacții mai clare în jurul nivelurilor rotunde?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_024
    category: bazele_tradingului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: închiderea lumânării"
    body: Închiderea lumânării oferă mai mult context decât mișcarea din timpul formării ei. Mulți începători reacționează prea repede înainte ca lumânarea să se închidă.
    practical: Compară ce părea să se întâmple în timpul lumânării cu ce a rămas după închidere.
    question: Aștepți închiderea lumânării în analizele tale?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_025
    category: bazele_tradingului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: scenariul alternativ"
    body: O analiză matură include și scenariul alternativ. Dacă piața nu confirmă ideea principală, trebuie să știi ce urmărești în continuare.
    practical: Scrie scenariul principal și scenariul alternativ pentru același grafic.
    question: Îți pregătești și scenarii opuse sau urmărești o singură direcție?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_026
    category: bazele_tradingului
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: zgomotul de piață"
    body: Zgomotul este mișcarea care pare importantă pe termen foarte scurt, dar nu schimbă structura. Filtrarea zgomotului se învață prin observație.
    practical: Compară mișcarea de pe 1 minut cu cea de pe 1 oră.
    question: Ce timeframe te ajută să reduci zgomotul?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_027
    category: bazele_tradingului
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: jurnalul de observații"
    body: Un jurnal de observații nu este doar pentru trade-uri. Poți nota ce vezi, ce ai aștepta și unde analiza devine invalidă.
    practical: Scrie trei observații despre un grafic fără să formulezi o decizie de execuție.
    question: Ce ai descoperit când ai analizat fără presiune?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_028
    category: bazele_tradingului
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: răbdarea în analiză"
    body: Răbdarea înseamnă să lași piața să ofere informații suficiente. O analiză grăbită poate transforma orice mișcare într-un motiv imaginar.
    practical: Alege o zonă și așteaptă reacția înainte să tragi concluzii.
    question: Ce te face să grăbești cel mai des analiza?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_029
    category: bazele_tradingului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: claritatea setup-ului"
    body: Un setup clar poate fi explicat simplu. Dacă ai nevoie de multe scuze ca să îl justifici, probabil analiza nu este suficient de curată.
    practical: Explică un setup în maximum cinci rânduri.
    question: Când ai simțit ultima dată că forțezi o explicație?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: bazele_030
    category: bazele_tradingului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: lecția săptămânii"
    body: La final de săptămână, cel mai util lucru este să vezi ce concepte ai înțeles mai bine și ce rămâne neclar. Progresul vine din repetiție.
    practical: Alege trei concepte din săptămână și notează câte un exemplu pentru fiecare.
    question: Ce concept vrei să repeți săptămâna viitoare?
    disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
  - key: risc_001
    category: managementul_riscului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: riscul se stabilește înainte"
    body: Riscul trebuie decis înainte de execuție. Dacă îl calculezi după ce piața se mișcă, decizia devine emoțională și greu de controlat.
    practical: Scrie înainte de analiză cât ai accepta să pierzi într-un scenariu de studiu.
    question: Ai o regulă clară de risc pentru fiecare idee?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_002
    category: managementul_riscului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: risk per trade"
    body: Risk per trade înseamnă cât din cont accepți să riști pe o singură idee. O valoare mică ajută la continuitate și reduce presiunea emoțională.
    practical: Calculează cât înseamnă 1% dintr-un cont ipotetic de 1.000 de lei.
    question: Ce procent ți se pare realist pentru un începător?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_003
    category: managementul_riscului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: position sizing"
    body: Position sizing leagă distanța până la invalidare de suma riscată. Fără acest calcul, aceeași idee poate avea risc foarte diferit.
    practical: Construiește un exemplu simplu cu risc fix și stop mai larg versus stop mai strâns.
    question: Calculezi mărimea poziției înainte de scenariu?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_004
    category: managementul_riscului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: stop loss logic"
    body: Stop loss-ul are sens când este legat de invalidare, nu de o sumă aleasă la întâmplare. El protejează disciplina și capitalul.
    practical: Alege o idee și marchează unde structura nu ar mai susține scenariul.
    question: Pui stop-ul după structură sau după confort emoțional?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_005
    category: managementul_riscului
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: drawdown-ul"
    body: Drawdown-ul este scăderea contului față de un punct anterior. El face parte din trading, dar trebuie controlat prin risc mic și reguli clare.
    practical: Simulează cinci pierderi consecutive cu risc de 1% și apoi cu risc de 5%.
    question: Ce observi despre diferența dintre cele două simulări?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_006
    category: managementul_riscului
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: raportul risk-reward"
    body: Raportul risk-reward compară riscul asumat cu potențialul scenariului. Nu garantează rezultatul, dar ajută la evaluarea ideii.
    practical: Desenează un exemplu cu risc de 1R și potențial de 2R.
    question: Urmărești raportul înainte sau după ce îți place ideea?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_007
    category: managementul_riscului
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: pierderile consecutive"
    body: Pierderile consecutive sunt normale într-un proces cu incertitudine. Problema apare când fiecare pierdere schimbă regula următoarei decizii.
    practical: Scrie ce ai face după trei pierderi ipotetice la rând.
    question: Ai o regulă pentru pauză după o serie dificilă?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_008
    category: managementul_riscului
    weekdayType: concept
    difficulty: beginner
    title: "📘 Conceptul zilei: max daily loss"
    body: O limită zilnică de pierdere protejează traderul de decizii impulsive. Când limita este atinsă, ziua devine una de analiză, nu de execuție.
    practical: Definește o limită zilnică ipotetică și ce faci după atingerea ei.
    question: Ți-ar fi greu să te oprești pentru restul zilei?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_009
    category: managementul_riscului
    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: un trade nu te definește"
    body: O singură idee nu spune nimic definitiv despre valoarea ta ca trader. Procesul se evaluează pe serii de decizii, nu pe un rezultat izolat.
    practical: Notează trei criterii de proces care contează mai mult decât rezultatul unei idei.
    question: "Ce te afectează mai tare: pierderea sau faptul că ai încălcat planul?"
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_010
    category: managementul_riscului
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: nu muta invalidarea"
    body: Mutarea invalidării după ce piața merge împotriva scenariului transformă riscul planificat în risc emoțional. Regula trebuie stabilită înainte.
    practical: Găsește un exemplu istoric unde mutarea invalidării ar fi agravat pierderea.
    question: Ce emoție apare când vrei să muți stop-ul?
    disclaimer: Conținut educațional. Tradingul implică risc, iar fiecare decizie trebuie luată responsabil.
  - key: risc_011
    category: managementul_riscului
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: nu adăuga la pierdere"
