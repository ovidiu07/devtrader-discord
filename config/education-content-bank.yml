- key: bazele_058
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: review după sesiune'
  body: 'Review-ul după sesiune transformă graficul în lecție. Cele mai utile întrebări sunt: ce lichiditate a fost luată, ce structură s-a schimbat și unde era zona de valoare.'
  practical: Fă screenshot înainte și după sesiune, apoi notează diferența dintre plan și livrarea reală.
  question: Ce ai văzut mai clar după ce sesiunea s-a terminat?
