  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: jurnal emoțional'
  body: 'Jurnalul emoțional îți arată tipare care nu apar în P&L: grabă, frustrare, ezitare, entuziasm, oboseală. Fără aceste date, repeți aceleași reacții.'
  practical: 'Adaugă coloane: emoție înainte, emoție în timpul trade-ului, emoție după.'
