    body: "Pentru recap, alege o știre macro și separă informația în trei părți: ce s-a publicat, ce aștepta piața, cum a reacționat graficul."
    practical: Completează cele trei puncte pentru o știre recentă.
    question: Care parte este cel mai greu de interpretat?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
