  category: bazele_tradingului
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: no trade zone'
  body: O zonă de no trade este locul unde prețul este între lichidități, fără premium/discount clar sau fără structură curată. A ști unde nu tranzacționezi este parte din edge.
  practical: Marchează pe grafic o zonă unde nu ai voie să cauți intrări și explică de ce.
  question: Care este zona de pe grafic unde orice idee ar fi forțată?
