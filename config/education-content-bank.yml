  category: bazele_tradingului
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: setup de continuare'
  body: Setup-ul de continuare caută intrare după ce piața confirmă direcția și se retrage într-o zonă de valoare. Calitatea scade dacă intri direct în lichiditate externă.
  practical: Găsește un trend și marchează prima retragere într-un FVG/OB după BOS.
  question: Intrarea urmărește continuarea sau cumperi/vinzi prea aproape de țintă?
