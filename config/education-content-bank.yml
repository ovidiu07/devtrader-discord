  category: bazele_tradingului
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: manipulare la deschidere'
  body: Deschiderile de sesiune pot crea mișcări false pentru a lua lichiditate. Nu orice prim impuls este direcția zilei.
  practical: Observă primele 15 minute după London/NY open și vezi dacă high/low-ul inițial este spart ulterior.
  question: Aștepți să se formeze range-ul inițial sau reacționezi la prima lumânare?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_044
  category: bazele_tradingului
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: FVG consequent encroachment'
  body: Nivelul de 50% al unui FVG, numit consequent encroachment, poate acționa ca zonă fină de reacție. Totuși, contează doar dacă gap-ul aparține unui impuls relevant.
  practical: Marchează 50% din FVG și observă dacă reacția apare acolo sau după umplere completă.
  question: FVG-ul tău are CE respectat sau piața îl ignoră?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: bazele_045
  category: bazele_tradingului
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: order flow'
  body: 'Order flow-ul descrie secvența de livrare a prețului: ce lichiditate ia, ce structură rupe și ce zone respectă. Este mai important decât un singur semnal izolat.'
  practical: Scrie ultimele cinci evenimente ale pieței în ordine cronologică.
  question: Ordinea evenimentelor susține clar direcția urmărită?
