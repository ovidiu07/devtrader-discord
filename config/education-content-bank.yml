  difficulty: beginner
  title: '📌 Recapitularea săptămânii: proces peste rezultat'
  body: Rezultatul unui trade este zgomotos; procesul pe 50-100 de decizii este mai relevant. Un trade câștigător luat prost este periculos pentru că întărește comportamentul greșit.
  practical: 'Evaluează fiecare trade cu două scoruri: rezultat și respectare proces.'
