  difficulty: beginner
  title: '💭 Întrebarea zilei: bias zilnic'
  body: Biasul zilnic este o ipoteză, nu o promisiune. El trebuie actualizat dacă piața ia lichiditate importantă și schimbă structura.
  practical: Scrie biasul înainte de sesiune și condiția exactă care îl anulează.
  question: Ce eveniment de pe grafic te-ar face să renunți la bias?
