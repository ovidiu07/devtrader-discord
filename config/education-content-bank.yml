  difficulty: beginner
  title: '📌 Recapitularea săptămânii: comparația cu alții'
  body: Comparația cu traderi mai avansați poate crea risc emoțional. Nu vezi drawdown-ul, contextul, capitalul sau anii de practică ai altcuiva.
