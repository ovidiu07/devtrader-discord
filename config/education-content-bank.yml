  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: rutina de pre-market'
  body: Rutina de pre-market reduce deciziile impulsive. Când repeți aceiași pași, mintea intră în modul de analiză, nu în modul de reacție.
  practical: 'Construiește o rutină de 7 minute: macro, HTF, lichiditate, zone, risc, stare mentală.'
