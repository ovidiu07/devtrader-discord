    weekdayType: mistake
    difficulty: beginner
    title: "📘 Greșeala zilei: checklist înainte de analiză"
    body: Un checklist simplu reduce haosul. Înainte de grafic, verifică timeframe-ul, calendarul economic, trendul și zonele importante.
    practical: Scrie un checklist de cinci puncte și folosește-l la următoarea analiză.
    question: Ce punct ar trebui să fie primul pe lista ta?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
