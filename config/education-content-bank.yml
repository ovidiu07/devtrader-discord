    category: resurse_educationale
    weekdayType: exercise
    difficulty: beginner
    title: "📘 Exercițiul zilei: plan de studiu pe o săptămână"
    body: Un plan bun de studiu este realist. Mai bine repeți zilnic un concept decât să consumi multe materiale fără aplicare.
    practical: Alege cinci zile și câte un subiect scurt pentru fiecare.
    question: Ce subiect vrei să studiezi primul?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
  - key: resurse_004
    category: resurse_educationale
    weekdayType: reflection
    difficulty: beginner
    title: "📘 Întrebarea zilei: întrebări de auto-review"
    body: "Auto-review-ul transformă experiența în lecție. Întrebările bune sunt simple: ce am văzut, ce am presupus, ce a confirmat piața, ce am învățat."
    practical: Răspunde la aceste patru întrebări pentru un grafic de azi.
    question: Care întrebare îți oferă cea mai mare claritate?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
  - key: resurse_005
    category: resurse_educationale
    weekdayType: case_study
    difficulty: beginner
    title: "📘 Studiu practic: template de jurnal"
    body: Un jurnal util nu trebuie să fie complicat. Include data, activul, contextul, scenariul, emoția, regula respectată și lecția.
    practical: Creează un template cu șapte coloane și testează-l trei zile.
    question: Ce coloană lipsește din jurnalul tău actual?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
  - key: resurse_006
    category: resurse_educationale
    weekdayType: recap
    difficulty: beginner
    title: "📘 Recapitularea săptămânii: exercițiu de suport și rezistență"
    body: Exercițiul de azi este să marchezi zone, nu linii perfecte. Caută zone unde prețul a reacționat clar de mai multe ori.
    practical: Marchează maximum trei zone ca să eviți aglomerarea graficului.
    question: Cum îți dai seama că ai desenat prea multe niveluri?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
  - key: resurse_007
    category: resurse_educationale
    weekdayType: preparation
    difficulty: beginner
    title: "📘 Pregătirea săptămânii: exercițiu de lumânări"
    body: "Alege zece lumânări relevante și descrie-le simplu: impuls, respingere, indecizie sau continuare. Scopul este vocabularul vizual."
    practical: Fă capturi cu trei lumânări și scrie o propoziție pentru fiecare.
    question: Ce tip de lumânare recunoști cel mai ușor?
    disclaimer: Exercițiu educațional pentru studiu și disciplină.
