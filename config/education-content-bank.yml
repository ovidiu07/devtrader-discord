  difficulty: beginner
  title: '🔎 Studiu practic: presiunea de a performa'
  body: Presiunea financiară poate transforma tradingul într-o nevoie urgentă de rezultat. Această stare deteriorează disciplina, pentru că fiecare trade pare important pentru viața ta.
