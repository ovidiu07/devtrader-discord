  question: Urmărești procesul tău sau emoția grupului?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_050
  category: psihologie_si_disciplina
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: întrebări bune'
  body: Calitatea întrebărilor schimbă calitatea învățării. 'Intrăm long?' este mai slab decât 'ce confirmare ar valida scenariul bullish?'.
  practical: Rescrie trei întrebări impulsive în întrebări de proces.
  question: Ce întrebare te-ar face un trader mai bun?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_051
  category: psihologie_si_disciplina
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: răbdarea în educație'
  body: La început, tentația este să cauți setup-uri avansate înainte să stăpânești structura, lichiditatea și riscul. Ordinea corectă reduce confuzia.
  practical: Alege un singur concept SMC și studiază-l pe 30 exemple înainte să treci mai departe.
  question: Ce concept de bază merită repetat mai mult?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_052
  category: psihologie_si_disciplina
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: weekend review psihologic'
  body: Review-ul psihologic de weekend arată ce emoții au influențat deciziile. Nu urmărești vinovăție, ci tipare repetabile care pot fi corectate.
  practical: Scrie top 3 emoții ale săptămânii și deciziile asociate lor.
  question: Ce tipar emoțional vrei să reduci săptămâna viitoare?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_053
  category: psihologie_si_disciplina
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: proces 60 zile'
  body: 'Un ciclu de 60 zile trebuie să construiască obiceiuri: rutină, jurnal, risc, review și selecție. Nu urmări transformare rapidă, ci dovezi zilnice de disciplină.'
  practical: Definește 5 metrici zilnice și marchează-le timp de 60 de zile.
  question: Ce obicei, dacă îl repeți 60 zile, îți schimbă tradingul?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_054
  category: psihologie_si_disciplina
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: acceptarea noii informații'
  body: Piața poate oferi informații care contrazic planul inițial. Flexibilitatea matură nu înseamnă să schimbi scenariul la fiecare lumânare, ci să accepți invalidarea când criteriile clare sunt atinse.
  practical: Scrie dinainte ce informație nouă te-ar face să schimbi scenariul.
  question: Când devine adaptare și când devine lipsă de disciplină?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_055
  category: psihologie_si_disciplina
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: decizii sub presiune'
  body: Sub presiune, creierul caută scurtături și ignoră pași importanți. De aceea regulile trebuie să fie simple, vizibile și repetate înainte de sesiune.
  practical: Pune checklistul de risc lângă platformă și citește-l înainte de orice idee.
  question: Ce pas uiți primul când presiunea crește?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_056
  category: psihologie_si_disciplina
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: recuperarea după greșeală'
  body: O greșeală nu trebuie urmată de încă una. Capacitatea de a opri lanțul după prima abatere este o abilitate psihologică esențială.
  practical: După prima abatere, oprește sesiunea sau treci pe replay, fără excepție.
  question: Cât de repede poți întrerupe lanțul greșelilor?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_057
  category: psihologie_si_disciplina
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: focus pe un instrument'
  body: Prea multe instrumente cresc zgomotul mental. La început, focusul pe 1-2 instrumente ajută să înveți ritmul, sesiunile și reacțiile specifice.
  practical: Alege un instrument principal pentru 10 sesiuni și notează doar comportamentul lui.
  question: Ce observi mai bine când reduci numărul de grafice?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_058
  category: psihologie_si_disciplina
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: toleranța la oportunități ratate'
  body: Oportunitățile ratate fac parte din trading. Dacă alergi după ele, transformi o decizie bună de a aștepta într-o intrare slabă.
  practical: 'Notează fiecare mișcare ratată și clasifică: era în plan sau nu era în plan.'
  question: Cât de greu îți este să spui 'nu era trade-ul meu'?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_059
  category: psihologie_si_disciplina
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: ritualul de închidere'
  body: Închiderea sesiunii este importantă pentru separarea pieței de viața personală. Fără ritual, rămâi mental prins în grafice și cauți justificări după program.
  practical: La final, scrie 3 observații, 1 lecție și închide platforma complet.
  question: Ce te ajută să lași sesiunea în urmă?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: psiho_060
  category: psihologie_si_disciplina
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: atenția selectivă'
  body: Când ai un bias, observi mai ușor informația care îl confirmă. Atenția selectivă este periculoasă deoarece pare analiză, dar este filtrare emoțională.
  practical: Forțează-te să scrii un argument opus pentru fiecare scenariu principal.
  question: Ce semnal opus ai ignorat pentru că nu se potrivea cu ideea ta?
  disclaimer: Conținut educațional. Nu reprezintă consultanță financiară.
- key: resurse_001
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: template analiză top-down'
  body: Un template top-down standardizează analiza și reduce improvizația. Include context HTF, lichiditate, dealing range, zona de interes, confirmare LTF, invalidare și target logic.
  practical: Completează același template pe trei instrumente fără să modifici ordinea pașilor.
  question: Care secțiune din template îți clarifică cel mai mult decizia?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_002
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: fișa de setup A+'
  body: Fișa de setup A+ definește ce înseamnă calitate înainte să apară emoția. Ea trebuie să includă criterii obiective, nu formulări vagi precum 'arată bine'.
  practical: Scrie 6 criterii obligatorii pentru setup-ul tău A+.
  question: Ce criteriu transformă o idee normală într-una de calitate?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_003
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: jurnal în R'
  body: Jurnalul în R permite compararea performanței fără influența mărimii contului. Este mai curat pentru învățare decât notarea doar în bani.
  practical: 'Adaugă coloanele: planned R, realized R, max favorable excursion, max adverse excursion.'
  question: Ce observi când analizezi R, nu suma?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_004
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: bibliotecă de screenshot-uri'
  body: O bibliotecă de screenshot-uri devine manualul tău personal. Cele mai bune exemple sunt cele annotate înainte și după sesiune, nu doar trade-urile câștigătoare.
  practical: Salvează câte un screenshot înainte, în timpul și după setup.
  question: Ce tip de screenshot îți lipsește cel mai mult?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_005
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: tag-uri în jurnal'
  body: 'Tag-urile transformă jurnalul într-o bază de date. Exemple utile: sweep, FVG, OB, NY AM, CPI, revenge, no trade, late entry.'
  practical: Definește 15 tag-uri și folosește-le constant timp de 30 zile.
  question: Ce tag te-ar ajuta să găsești cel mai repede greșelile repetate?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_006
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișa de risc'
  body: 'Fișa de risc trebuie completată înainte de intrare: risc per trade, max daily loss, invalidare, costuri, știri, expunere totală. Ea previne deciziile făcute după entuziasm.'
  practical: Creează o fișă cu bife și câmpuri scurte, nu cu texte lungi.
  question: Ce câmp te-ar opri din cele mai multe intrări slabe?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_007
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: calendar macro săptămânal'
  body: Calendarul macro săptămânal este resursă de orientare. Notează evenimentele cu impact mare, ora României, instrumentele sensibile și scenariile posibile.
  practical: Luni, scrie top 5 evenimente și marchează intervalele no-trade.
  question: Ce eveniment ar putea schimba cel mai mult volatilitatea săptămânii?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_008
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: checklist de știri'
  body: Un checklist de știri te ajută să nu reacționezi la headline fără context. Include forecast, actual, previous, revision, prima reacție și reacția după 15 minute.
  practical: Aplică checklistul la următorul CPI, NFP sau FOMC.
  question: Ce ai înțeles după 15 minute ce nu era clar în prima lumânare?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_009
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: model replay'
  body: Replay-ul îți permite să exersezi fără presiune reală. Cel mai util este să oprești graficul înainte de confirmare și să scrii scenariul, nu să derulezi direct la rezultat.
  practical: Fă 10 sesiuni replay și notează decizia înainte să vezi continuarea.
  question: Ce ai anticipat greșit când nu știai viitorul?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_010
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: exercițiu sweep'
  body: 'Exercițiul sweep dezvoltă ochiul pentru lichiditate. Nu nota doar nivelul luat, ci și ce se întâmplă după: acceptare, respingere, displacement, range.'
  practical: 'Găsește 20 de sweep-uri și clasifică-le: reversal, continuare, fake fără reacție.'
  question: Ce tip de sweep apare cel mai des pe instrumentul tău?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_011
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: exercițiu FVG'
  body: Studiul FVG trebuie să se concentreze pe calitate, nu pe număr. Un FVG bun are context, displacement și poziție logică în premium/discount.
  practical: Colectează 30 FVG-uri și notează dacă au fost respectate, umplute sau ignorate.
  question: Ce caracteristică au FVG-urile care funcționează cel mai bine?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_012
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: exercițiu OB'
  body: Pentru order block-uri, notează cauza, nu doar lumânarea. Întreabă dacă zona a generat displacement și rupere de structură sau doar arată frumos.
  practical: Selectează 20 OB-uri și elimină-le pe cele fără BOS/CHOCH relevant.
  question: Ce OB-uri ai marcat prea generos?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_013
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișă premium/discount'
  body: Fișa premium/discount te obligă să nu cauți long în premium sau short în discount fără motiv solid. Locația este un filtru major de calitate.
  practical: Pentru fiecare analiză, marchează dealing range-ul și poziția actuală a prețului.
  question: Setup-ul tău pornește din valoare sau dintr-o zonă scumpă?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_014
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: hartă de lichiditate'
  body: Harta de lichiditate arată unde ar putea merge prețul înainte de confirmare. Include EQH/EQL, high/low anterior, Asia range, daily high/low și trendline liquidity.
  practical: Desenează harta înainte de sesiune și compar-o cu mișcarea reală la final.
  question: Care lichiditate a fost atrasă prima?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_015
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: fișă sesiuni'
  body: O fișă de sesiuni îți arată când instrumentul tău se mișcă cel mai clar. Notează Asia, London, NY AM, NY PM, ora României și tipul de mișcare.
  practical: Timp de 10 zile, notează sesiunea în care apare setup-ul cel mai curat.
  question: În ce interval ai cel mai bun raport claritate/risc?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_016
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: review de weekend'
  body: Review-ul de weekend trebuie să producă o singură lecție aplicabilă, nu doar multe observații. Alege pattern-ul cel mai repetat și transformă-l în regulă pentru săptămâna următoare.
  practical: Revizuiește 5 screenshot-uri și extrage o regulă concretă.
  question: Ce regulă vrei să testezi săptămâna viitoare?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_017
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: fișa de greșeli'
  body: O fișă de greșeli normalizează analiza erorilor. Include tip greșeală, declanșator, cost în R, regulă preventivă și status de îmbunătățire.
  practical: Completează fișa pentru ultimele trei abateri din jurnal.
  question: Care greșeală are cel mai mare cost cumulat?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_018
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: watchlist educațional'
  body: Watchlist-ul educațional nu este listă de semnale, ci listă de instrumente pe care le studiezi pentru comportament. Prea multe simboluri reduc adâncimea observației.
  practical: Alege maximum 3 instrumente și definește ce vrei să înveți de la fiecare.
  question: Ce instrument îți oferă cele mai clare exemple pentru nivelul tău?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_019
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: plan de 60 zile'
  body: 'Un plan de 60 zile trebuie împărțit în faze: observație, replay, reguli, forward testing, review. Scopul este acumularea de date, nu transformarea imediată în profit.'
  practical: Definește câte 10 zile pentru fiecare abilitate principală.
  question: Ce abilitate vrei să măsori la finalul celor 60 de zile?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_020
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: rubrică de notare setup'
  body: O rubrică de notare face setup-urile comparabile. Poți nota locația, lichiditatea, confirmarea, risc/target, timing și stare mentală de la 1 la 5.
  practical: Scor minim 20/30 pentru analiză serioasă, sub acest scor doar observație.
  question: Ce setup-uri par bune vizual, dar pică la scor?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_021
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: template post Discord'
  body: Un template pentru comunitate trebuie să educe, nu să dea direcții oarbe. Include context, niveluri, scenariu bullish, scenariu bearish, confirmare, invalidare și lecția zilei.
  practical: Scrie o analiză DAX în 7 rânduri folosind același format.
  question: Ce secțiune ajută cel mai mult începătorii?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_022
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: întrebări pentru comunitate'
  body: Întrebările bune cresc calitatea discuției. În loc de 'long sau short?', întreabă 'ce lichiditate este mai probabil să fie atacată și ce ar invalida ideea?'.
  practical: Pregătește 5 întrebări de proces pentru canalul analiza-zilei.
  question: Ce întrebare schimbă conversația din predicție în educație?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_023
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: exercițiu no-trade'
  body: Exercițiul no-trade învață selecția. Traderul notează motivele pentru care nu intră și observă câte pierderi evită prin refuzul setup-urilor mediocre.
  practical: Alege o zi în care ai voie doar să marchezi setup-uri refuzate.
  question: Ce ai evitat prin răbdare?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_024
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: fișa macro pentru trader'
  body: 'Fișa macro pentru trader trebuie să conecteze datele cu activele: CPI → randamente/dolar/NQ, petrol → inflație, BCE → EUR/DAX, Fed → global risk.'
  practical: Construiește o matrice cu eveniment, activ afectat, reacție hawkish/dovish.
  question: Ce relație macro îți clarifică cel mai mult graficele?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_025
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: matrice instrumente'
  body: Matricea instrumentelor arată ce factori domină fiecare piață. DAX, NQ, EURUSD, XAUUSD și petrolul nu reacționează la aceleași informații.
  practical: Pentru fiecare instrument, scrie top 3 drivere macro și top 3 riscuri tehnice.
  question: Ce instrument este cel mai compatibil cu stilul tău?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_026
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: bibliotecă de pattern-uri'
  body: O bibliotecă de pattern-uri trebuie să conțină exemple bune, exemple eșuate și exemple neclare. Doar exemplele perfecte creează așteptări nerealiste.
  practical: Pentru fiecare pattern, salvează 5 câștigătoare, 5 pierzătoare și 5 no-trade.
  question: Ce înveți din exemplele eșuate?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_027
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișă de backtesting'
  body: Fișa de backtesting trebuie să includă contextul, nu doar intrare/ieșire. Notează sesiune, lichiditate luată, PD array, confirmare, R și motivul invalidării.
  practical: Testează un singur setup pe 50 exemple fără să schimbi regulile.
  question: Ce condiție apare în exemplele profitabile?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_028
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: fișă de forward testing'
  body: Forward testingul verifică execuția în timp real. Include timpul de decizie, emoția, respectarea checklistului și diferența dintre plan și execuție.
  practical: Rulează 20 zile cu risc demo sau minim și notează abaterile.
  question: Ce regulă este greu de respectat live?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_029
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: tracker de obiceiuri'
  body: 'Un tracker de obiceiuri măsoară disciplina zilnică: rutină, calendar, analiză top-down, jurnal, review, pauză. Bifele simple pot arăta progres real.'
  practical: Creează un tabel cu 6 obiceiuri și 60 coloane pentru zile.
  question: Ce obicei are cea mai mare rată de lipsă?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_030
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: fișă de emoții'
  body: Fișa de emoții conectează starea mentală cu deciziile. Emoțiile nu sunt problema; problema este când devin comandă pentru execuție.
  practical: Notează emoția dominantă și decizia asociată pentru fiecare setup.
  question: Ce emoție produce cele mai multe abateri?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_031
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: protocol de pauză'
  body: 'Protocolul de pauză definește când și cum te oprești. Include trigger: -2R, două greșeli, oboseală, știri haotice, impuls de revenge.'
  practical: Scrie protocolul în trei pași și ține-l vizibil lângă platformă.
  question: Ce trigger trebuie să activeze pauza fără negociere?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_032
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: protocol după max loss'
  body: După max loss, nu mai ai obiectiv de trading, ci de protejare a procesului. Protocolul trebuie să elimine accesul la decizii impulsive.
  practical: 'Definește: platforma se închide, jurnal complet, review a doua zi, risc redus următoarea sesiune.'
  question: Ce ai face concret în primele 5 minute după max loss?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_033
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: fișă de lecții zilnice'
  body: O lecție zilnică trebuie să fie specifică, nu generică. 'Am fost impulsiv' devine util doar dacă scrii momentul, triggerul și regula preventivă.
  practical: 'La finalul zilei, scrie o lecție în format: situație, reacție, corecție.'
  question: Ce lecție poți aplica mâine?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_034
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: glosar SMC'
  body: Un glosar SMC ajută începătorii să nu confunde termeni. Pentru fiecare termen, include definiție, condiții de validare și greșeli comune.
  practical: Scrie definiții pentru BOS, CHOCH, FVG, OB, sweep, inducement.
  question: Ce termen folosești încă prea vag?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_035
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: fișă de exemple pentru FVG'
  body: O fișă dedicată FVG trebuie să arate unde gap-ul este valid și unde este doar un spațiu pe grafic. Include context, impuls, poziție și reacție.
  practical: Colectează 10 exemple de FVG valid și 10 invalidate.
  question: Ce diferență vezi între ele?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_036
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: fișă pentru lichiditate'
  body: Fișa de lichiditate te învață să vezi nivelurile evidente pentru toți participanții. Include high/low, EQH/EQL, trendline liquidity și Asia range.
  practical: Înainte de sesiune, marchează maximum cinci pool-uri de lichiditate.
  question: Care nivel este cel mai evident și deci cel mai vulnerabil?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_037
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: worksheet BOS/CHOCH'
  body: Un worksheet BOS/CHOCH clarifică diferența dintre continuare și schimbare. Include capturi unde CHOCH e real și capturi unde este doar zgomot LTF.
  practical: Etichetează 20 exemple cu BOS, CHOCH sau noise.
  question: Ce criteriu separă CHOCH real de zgomot?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_038
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: worksheet premium/discount'
  body: Worksheet-ul premium/discount antrenează locația. Fără locație bună, chiar și confirmarea LTF poate avea probabilitate mai slabă.
  practical: Pe 20 grafice, marchează range-ul și clasifică intrările ca premium, discount sau equilibrium.
  question: Unde apar cele mai multe setup-uri de calitate?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_039
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: worksheet inducement'
  body: Inducement-ul este greu pentru începători pentru că arată ca setup valid. Worksheet-ul trebuie să compare nivelul tentant cu zona mai profundă de valoare.
  practical: Găsește 15 exemple în care primul nivel a fost luat înainte de reacția reală.
  question: Ce te-ar fi făcut să aștepți zona mai bună?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_040
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: fișă de management trade'
  body: 'Managementul trade-ului trebuie planificat: unde iei parțial, când muți stop-ul, ce faci dacă prețul stagnează, unde ieși complet.'
  practical: Completează fișa înainte de intrare pentru un setup istoric.
  question: Care decizie de management este cel mai des improvizată?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_041
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișă de invalidare'
  body: Invalidarea scrisă previne speranța. Ea trebuie să descrie evenimentul tehnic exact care anulează ideea, nu doar un preț arbitrar.
  practical: Pentru fiecare scenariu, scrie 'ideea este invalidă dacă...'.
  question: Invalidarea ta este suficient de clară pentru a nu negocia?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_042
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: fișă de target'
  body: Țintele trebuie conectate la lichiditate și structură. O fișă de target previne alegerea arbitrară a profitului doar pentru că arată bine ca R:R.
  practical: Marchează TP1 la lichiditate internă și TP2 la lichiditate externă când are sens.
  question: Targetul tău are motiv structural?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_043
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: fișă de setup eșuat'
  body: Setup-urile eșuate sunt cele mai valoroase pentru rafinare. Ele arată dacă problema a fost contextul, intrarea, riscul, timingul sau lipsa confirmării.
  practical: Pentru 10 pierderi, clasifică motivul eșecului într-o singură categorie principală.
  question: Care categorie apare cel mai des?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_044
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: ghid pentru începători'
  body: Un ghid bun pentru începători trebuie să înceapă cu structură, risc și jurnal, nu cu setup-uri complexe. Fără aceste baze, SMC devine doar desenat pe grafic.
  practical: Scrie ordinea de studiu pentru primele 30 zile ale unui membru nou.
  question: Ce concept trebuie predat înainte de FVG?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_045
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: calendar de conținut educațional'
  body: Un calendar educațional bun alternează concept, greșeală, exercițiu, reflecție, studiu practic și recap. Repetiția structurată ajută comunitatea să învețe progresiv.
  practical: Planifică o săptămână cu 6 tipuri diferite de postări pe aceeași temă.
  question: Ce temă merită repetată în mai multe formate?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_046
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: fișă pentru mentor'
  body: 'Fișa pentru mentor te ajută să răspunzi consecvent în comunitate. Include: întreabă contextul, cere invalidarea, verifică riscul, nu da semnal direct, explică procesul.'
  practical: Pregătește 5 răspunsuri standard pentru membri care întreabă 'intrăm?'.
  question: Cum transformi o întrebare de semnal într-o lecție?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_047
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: rubrică de feedback'
  body: 'Feedback-ul bun este specific: ce a fost clar, ce lipsește, ce trebuie verificat și ce exercițiu urmează. Evită feedback-ul vag precum ''bun'' sau ''greșit''.'
  practical: 'Analizează o postare de membru folosind: context, lichiditate, confirmare, risc, claritate.'
  question: Ce tip de feedback ajută fără să descurajeze?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_048
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișă de progres lunar'
  body: Progresul lunar trebuie măsurat prin comportamente repetabile, nu doar P&L. Include respectare risc, jurnal complet, setup-uri refuzate, review-uri, emoții.
  practical: La final de lună, acordă scor 1-5 pentru fiecare comportament-cheie.
  question: Ce metrică arată cel mai bine maturizarea ta?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_049
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: sistem de lecții scurte'
  body: 'Lecțiile scurte funcționează bine în Discord dacă au structură: idee, exemplu, exercițiu, întrebare. Membrii învață mai bine când pot aplica imediat.'
  practical: Transformă un concept SMC într-o postare de maximum 120 de cuvinte plus exercițiu.
  question: Ce lecție poate fi aplicată în 10 minute?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_050
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: mini-quiz trading'
  body: Mini-quiz-urile verifică înțelegerea fără presiune. Întrebările trebuie să ceară raționament, nu memorarea termenilor.
  practical: Creează 5 întrebări cu variante despre sweep, BOS, FVG și invalidare.
  question: Ce întrebare ar arăta dacă membrul chiar înțelege conceptul?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_051
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: studiu de caz săptămânal'
  body: Un studiu de caz săptămânal adună toate conceptele într-un exemplu real. Arată contextul inițial, scenariile, ce a făcut piața și ce lecție rămâne.
  practical: Alege o zi pe DAX/NQ și documentează-o cu 3 screenshot-uri.
  question: Ce lecție generală scoți din acest caz?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_052
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: fișă de reguli personale'
  body: Regulile personale trebuie să fie puține, clare și verificabile. Dacă regula nu poate fi bifată obiectiv, va fi greu de respectat sub presiune.
  practical: Scrie 10 reguli și elimină-le până rămân 5 esențiale.
  question: Care regulă are cel mai mare impact asupra rezultatelor tale?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_053
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: hartă de învățare SMC'
  body: O hartă de învățare SMC ar trebui să progreseze de la structură la lichiditate, apoi la PD arrays, timing, entry model și risk. Ordinea contează pentru claritate.
  practical: Desenează o hartă cu 6 niveluri și ce exercițiu aparține fiecăruia.
  question: La ce nivel ești blocat acum?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_054
  category: resurse_educationale
  weekdayType: case_study
  difficulty: beginner
  title: '🔎 Studiu practic: resurse pentru sesiunea live'
  body: 'Pentru sesiuni live cu comunitatea, pregătește înainte: calendar macro, niveluri HTF, lichidități, scenarii și reguli de no-trade. Asta previne improvizația publică.'
  practical: Cu 15 minute înainte de sesiune, completează fișa live.
  question: Ce informație trebuie pregătită înainte să vorbești cu membrii?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_055
  category: resurse_educationale
  weekdayType: recap
  difficulty: beginner
  title: '📌 Recapitularea săptămânii: fișă de recap comunitate'
  body: Recap-ul comunității trebuie să educe și după ce piața s-a mișcat. Include ce am urmărit, ce s-a confirmat, ce s-a invalidat și ce lecție rămâne.
  practical: La final de zi, postează un recap în 5 puncte fără a transforma totul în semnal.
  question: Ce lecție ar trebui să rămână membrilor după sesiune?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_056
  category: resurse_educationale
  weekdayType: preparation
  difficulty: beginner
  title: '🗓️ Pregătirea săptămânii: plan de conținut 60 zile'
  body: Un plan de conținut pe 60 zile trebuie să repete conceptele în profunzime, nu doar să adauge termeni noi. Fiecare temă trebuie să aibă concept, exercițiu și recap.
  practical: 'Împarte 60 zile în 5 module: baze, risc, macro, psihologie, studii de caz.'
  question: Ce modul are nevoie de cele mai multe exerciții practice?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_057
  category: resurse_educationale
  weekdayType: concept
  difficulty: beginner
  title: '📘 Conceptul zilei: arhivă de lecții'
  body: Arhiva de lecții ajută membrii noi să recupereze structurat. Organizează lecțiile pe module, dificultate și exerciții, nu doar cronologic.
  practical: 'Creează categorii: SMC basics, risk, macro, psychology, journal templates.'
  question: Ce lecție ar trebui să fie prima în arhivă?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_058
  category: resurse_educationale
  weekdayType: mistake
  difficulty: beginner
  title: '⚠️ Greșeala zilei: fișă de audit personal'
  body: Auditul personal lunar arată dacă procesul se îmbunătățește. Include cele mai repetate greșeli, cele mai clare setup-uri și regula pe care o vei schimba.
  practical: 'Completează auditul cu date, nu impresii: număr abateri, R pierdut prin greșeli, setup-uri refuzate.'
  question: Ce schimbare are cel mai mare potențial luna viitoare?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_059
  category: resurse_educationale
  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: sistem de notițe'
  body: Un sistem de notițe bun separă concepte, exemple, greșeli și reguli. Altfel, informația devine grămadă de idei fără aplicare.
  practical: 'Creează patru foldere sau pagini: concepte, exemple, jurnal, reguli.'
  question: Unde se pierde cel mai multă informație în procesul tău?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
- key: resurse_060
  category: resurse_educationale
  weekdayType: reflection
  difficulty: beginner
  title: '💭 Întrebarea zilei: lecția zilei cu aplicație'
  body: Fiecare lecție trebuie să se termine cu o acțiune concretă. Fără aplicație, educația rămâne consum pasiv și nu schimbă comportamentul pe grafic.
  practical: Pentru orice concept învățat, scrie un exercițiu de 10 minute.
  question: Ce acțiune dovedește că ai înțeles lecția?
  disclaimer: Exercițiu educațional pentru studiu și disciplină.
