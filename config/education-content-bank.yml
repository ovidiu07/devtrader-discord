  weekdayType: exercise
  difficulty: beginner
  title: '🧩 Exercițiul zilei: top-down analysis'
  body: Analiza top-down te împiedică să transformi zgomotul de pe timeframe mic în poveste principală. Începi cu direcția și lichiditatea mare, apoi cobori pentru execuție.
  practical: 'Fă o analiză în trei pași: 4H context, 1H zone, 5M confirmare.'
